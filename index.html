<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الطالب | المعهد</title>

<style>
:root{
    --main:#0b3c5d;
    --secondary:#f5f7fa;
    --border:#dcdcdc;
    --success:#2e7d32;
    --error:#c62828;
}

body{
    margin:0;
    font-family: "Segoe UI", Tahoma, Arial;
    background:#eef1f4;
}


.header{
    background:var(--main);
    color:#fff;
    padding:15px 20px;
    display:flex;
    align-items:center;
    gap:15px;
}

.header img{
    height:60px;
}

.header .title{
    font-size:20px;
    font-weight:700;
}

.header .subtitle{
    font-size:14px;
    opacity:.9;
}


.main{
    display:flex;
    justify-content:center;
    padding:40px 15px;
}

.container{
    background:#fff;
    width:100%;
    max-width:420px;
    border:1px solid var(--border);
    border-radius:6px;
}


.box-header{
    background:var(--secondary);
    padding:15px;
    border-bottom:1px solid var(--border);
    font-weight:700;
    color:var(--main);
    text-align:center;
}


.box-content{
    padding:25px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-size:14px;
    font-weight:600;
}

input{
    width:100%;
    padding:10px;
    border:1px solid var(--border);
    border-radius:4px;
    font-size:14px;
}

button{
    width:100%;
    padding:11px;
    background:var(--main);
    color:#fff;
    border:none;
    border-radius:4px;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.link-btn{
    display:block;
    text-align:center;
    margin-top:12px;
    font-size:13px;
    color:var(--main);
    cursor:pointer;
    text-decoration:underline;
}

#msg{
    text-align:center;
    margin-top:15px;
    font-weight:600;
}

.hidden{display:none;}

.info-box{
    background:#eef4ff;
    border:1px solid var(--main);
    padding:10px;
    margin-top:10px;
    text-align:center;
    font-weight:600;
}


.footer-img img{
    width:100%;
    border-top:1px solid var(--border);
}
</style>
</head>

<body>


<div class="header">
    <img src="logo.jpg" alt="Logo">
    <div>
        <div class="title">المعهد العالي للسياحة والفنادق بالغردقة</div>
        <div class="subtitle">بوابة الخدمات الإلكترونية للطلاب ( اظهار نتيجة الطلاب عن الفصل الدراسي الاول العام 2025-2026)</div>
    </div>
</div>

<div class="main">
<div class="container">

    <div class="box-header">تسجيل دخول الطالب</div>

    <div class="box-content">

        <div id="loginSection">
            <div class="form-group">
                <label>الكود الجامعي</label>
                <input type="text" id="userCode">
            </div>

            <div class="form-group">
                <label>كلمة المرور أو الرقم القومي</label>
                <input type="password" id="userPass">
            </div>

            <button onclick="handleLogin()">دخول</button>
            <a class="link-btn" onclick="toggleForgot()">نسيت الكود الجامعي؟</a>
        </div>

        <div id="forgotSection" class="hidden">
            <div class="form-group" id="nationalIdGroup">
                <label>الرقم القومي</label>
                <input type="text" id="nationalIdInput">
            </div>

            <button onclick="retrieveCode()">استعلام</button>
            <div id="resultBox" class="hidden info-box"></div>
            <a class="link-btn" onclick="toggleForgot()">العودة لتسجيل الدخول</a>
        </div>

        <div id="msg"></div>

    </div>

    <div class="footer-img">
        <img src="Cong.jpg" alt="Success">
    </div>

</div>
</div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyyo27m0mnubUrD_MSjxi4i_TqnrJuGzDXOsdb7MmeqO0bXWr7CGWurXxhpP7e9Bm_S/exec";

function toggleForgot(){
    loginSection.classList.toggle("hidden");
    forgotSection.classList.toggle("hidden");
    msg.innerText="";
    resultBox.classList.add("hidden");
    nationalIdGroup.style.display="block";
}

async function handleLogin(){
    if(!userCode.value||!userPass.value){
        showMsg("يرجى إدخال جميع البيانات","error");return;
    }
    showMsg("جاري التحقق...");
    try{
        const r=await fetch(API_URL,{
            method:"POST",
            body:JSON.stringify({action:"login",code:userCode.value,password:userPass.value})
        });
        const res=await r.json();
        if(res.status==="success"){
            showMsg("تم تسجيل الدخول بنجاح","success");
            localStorage.setItem("studentData",JSON.stringify(res.user));
            setTimeout(()=>location.href="results.html",1500);
        }else showMsg(res.msg,"error");
    }catch{showMsg("خطأ في الاتصال","error");}
}

async function retrieveCode(){
    if(!nationalIdInput.value){showMsg("أدخل الرقم القومي","error");return;}
    showMsg("جاري البحث...");
    try{
        const r=await fetch(API_URL,{
            method:"POST",
            body:JSON.stringify({action:"getStudentCode",nationalId:nationalIdInput.value})
        });
        const res=await r.json();
        if(res.status==="success"){
            nationalIdGroup.style.display="none";
            resultBox.innerHTML="كودك الجامعي:<br>"+res.code;
            resultBox.classList.remove("hidden");
            msg.innerText="";
        }else showMsg(res.msg,"error");
    }catch{showMsg("خطأ في الاتصال","error");}
}

function showMsg(t,type){
    msg.innerText=t;
    msg.style.color= type==="error"?"var(--error)":type==="success"?"var(--success)":"var(--main)";
}
</script>

</body>
</html>
